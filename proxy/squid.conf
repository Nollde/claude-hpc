# Squid proxy for domain whitelisting
# Domain ACLs are generated at build time from shared/allowed-domains.conf

http_port 3128

# Disable caching
cache deny all

# Logging to stderr for container visibility
access_log stdio:/dev/stderr
cache_log /tmp/squid-cache.log
coredump_dir /tmp
pid_filename /tmp/squid.pid

# Port ACLs
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# --- Domain whitelist (generated from shared/allowed-domains.conf) ---
# __DOMAIN_ACLS__

# --- Access rules ---
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow allowed_domains
http_access deny all
